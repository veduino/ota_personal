<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP Firmware Download</title>
</head>
<body>
    <p>Downloading firmware... if it doesn't start, 
       <a id="downloadLink" href="1000.bin" download="1000.bin">click here</a>.
    </p>

    <script>
        // This runs as soon as the page loads
        window.onload = function() {
            const link = document.getElementById('downloadLink');
            link.click();
        };
    </script>
</body>
</html>
